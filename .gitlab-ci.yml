stages:
  - generate-release
  - sast
  - build
  - coverage
  - integration
  - publish
  - release

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
      variables:
        NEXT_VERSION: '$CI_COMMIT_TAG'
    - variables:
        NEXT_VERSION: '$CI_COMMIT_SHORT_SHA'

variables:
  # This will suppress any download for dependencies and plugins or upload messages which would clutter the console log.
  # `showDateTime` will show the passed time in milliseconds. You need to specify `--batch-mode` to make this work.
  MAVEN_OPTS: "-Dhttps.protocols=TLSv1.2 -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true"
  # As of Maven 3.3.0 instead of this you may define these options in `.mvn/maven.config` so the same config is used
  # when running from the command line.
  # `installAtEnd` and `deployAtEnd` are only effective with recent version of the corresponding plugins.
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true"

# Cache downloaded dependencies and plugins between builds.
# To keep cache across branches add 'key: "$CI_JOB_NAME"'
cache:
  paths:
    - .m2/repository

################################################################################################
# Build
################################################################################################

# 1.18
.jdk17:
  image: maven:3.9-eclipse-temurin-17
  variables:
    MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true -DskipTests -Dmaven.test.skip=true"

# 1.20.5+
.jdk21:
  image: maven:3.9-eclipse-temurin-21

#use maven verify we don't need to pollute the cache with the build artifacts
.build:
  stage: build
  script:
    - mvn versions::set -DnewVersion=${NEXT_VERSION}
    - mvn versions::commit
    - 'mvn $MAVEN_CLI_OPTS verify'
  artifacts:
    paths:
      - plugin/target/*.jar                             #Grab the built jars
      - plugin/target/site/jacoco/jacoco.xml
    reports:
      junit:
        - plugin/target/surefire-reports/TEST-*.xml
        - plugin/target/failsafe-reports/TEST-*.xml

build:jdk17:
  extends: [.jdk17, .build]

build:jdk21:
  extends: [.jdk21, .build]

coverage:
  stage: coverage
  image: registry.gitlab.com/haynes/jacoco2cobertura:1.0.11
  script:
    # convert report from jacoco to cobertura, using relative project path
    - python /opt/cover2cover.py plugin/target/site/jacoco/jacoco.xml $CI_PROJECT_DIR/plugin/src/main/java/ > plugin/target/site/cobertura.xml
  needs: ["build:jdk21"]
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: plugin/target/site/cobertura.xml

################################################################################################
# Publish
################################################################################################

.publish:
  stage: publish
  script:
    - 'curl --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file plugin/target/ArtMap-${NEXT_VERSION}.jar "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ArtMap/${NEXT_VERSION}/ArtMap-${JDK}-${NEXT_VERSION}.jar"'
  rules:
    - if: '$CI_COMMIT_TAG'

publish:jdk17:
  extends: .publish
  needs: ["build:jdk17"]
  variables:
    JDK: "JDK17"

publish:jdk21:
  extends: .publish
  needs: ["build:jdk21"]
  variables:
    JDK: "JDK21"

################################################################################################
# Integration - Start a real Paper server in Docker.
#   bake-server-image: builds a Paper image with the Mojang jar pre-patched
#                      (every pipeline; reuses the registry copy when MC_VERSION
#                      is unchanged) so the runtime boot skips the slow, flaky
#                      "Downloading mojang_<version>.jar" step that was timing
#                      the integration job out.
#   integration:       verifies ArtMap loads cleanly (every pipeline)
#   integration:paint  also drives the mineflayer paint bot and checks Art.db
################################################################################################

# Shared Minecraft version + the registry ref for the pre-baked server image.
# The image is tagged by MC_VERSION so an unchanged version reuses the cached
# build. Keep MC_VERSION in sync between this job and the integration jobs.
.integration-vars:
  variables:
    MC_VERSION: "1.21.11"
    BAKED_IMAGE: "${CI_REGISTRY_IMAGE}/paper-baked:${MC_VERSION}"

# Build the pre-baked server image and push it to the project's container
# registry. Built with Kaniko, NOT docker:dind: the bake's RUN step downloads
# the ~56MB Mojang server jar, and large transfers hang indefinitely through
# the dind nested network (egress to Mojang is otherwise fine, and --mtu=1400
# didn't help). Kaniko runs the build on the normal runner network, where the
# download works.
#
# Only runs when the bake inputs change (the image definition), so unchanged
# pipelines reuse the already-pushed tag. Bump the image build or MC_VERSION to
# force a rebuild. Kaniko's --cache reuses unchanged layers across runs.
bake-server-image:
  extends: .integration-vars
  stage: integration
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  needs: []
  rules:
    - changes:
        - integration/server-image/**/*
        - .gitlab-ci.yml
    # Always allow a manual run (e.g. to seed the registry the first time, or
    # after the image is garbage-collected).
    - when: manual
      allow_failure: true
  script:
    # Kaniko reads registry credentials from /kaniko/.docker/config.json.
    - |
      AUTH=$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | /busybox/base64 | tr -d '\n')
      mkdir -p /kaniko/.docker
      printf '{"auths":{"%s":{"auth":"%s"}}}\n' "$CI_REGISTRY" "$AUTH" > /kaniko/.docker/config.json
    - /kaniko/executor
        --context "${CI_PROJECT_DIR}/integration/server-image"
        --dockerfile "${CI_PROJECT_DIR}/integration/server-image/Dockerfile"
        --build-arg "MC_VERSION=${MC_VERSION}"
        --destination "$BAKED_IMAGE"
        --cache=true
        --cache-repo "${CI_REGISTRY_IMAGE}/paper-baked-cache"

integration:
  extends: .integration-vars
  stage: integration
  image: docker:latest
  # docker:dind provides the Docker daemon.  TLS is disabled so the Docker CLI
  # in the outer container can reach it without certificate setup.
  services:
    - name: docker:dind
      command: ["--tls=false"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: "tcp://docker:2375"
    # Use the pre-baked server image so the runtime boot skips the Mojang jar
    # download. ProtocolLib version can be overridden in project variables.
    SERVER_IMAGE: "${BAKED_IMAGE}"
    PROTOCOLLIB_VERSION: "dev-build"
    TIMEOUT: "600"
  # bake-server-image is optional: it only runs when the image definition
  # changes, so most pipelines reuse the already-pushed tag and integration
  # just pulls it. optional:true keeps integration runnable when the bake is
  # skipped this pipeline.
  needs:
    - "build:jdk21"
    - job: "bake-server-image"
      optional: true
  before_script:
    # The dind service needs a moment to start.  Poll until the daemon answers.
    - until docker info >/dev/null 2>&1; do echo "Waiting for Docker daemon..."; sleep 2; done
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Invoke with sh explicitly: the docker:latest image is Alpine and has no bash.
    - sh integration/run-integration-test.sh
  artifacts:
    # Always upload the server log so failed runs can be diagnosed.
    when: always
    paths:
      - integration/server.log
    expire_in: 1 week

integration:paint:
  extends: integration
  variables:
    RUN_PAINT_TEST: "true"
  artifacts:
    when: always
    paths:
      - integration/server.log
      - integration/Art.db
    expire_in: 1 week

################################################################################################
# Release
################################################################################################

# Creates the GitLab Release and attaches the two published JARs as package
# assets.  Runs only on tags, after both publish jobs have succeeded.
release:gitlab-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: ["publish:jdk17", "publish:jdk21"]
  variables:
    # Full history is required so we can walk back to the previous tag.
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
  script:
    # Find the tag that immediately preceded this one (version-sorted).
    - PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CI_COMMIT_TAG}$" | head -1)
    # Build the commit range: either since the last tag, or the whole history.
    - |
      if [ -n "$PREV_TAG" ]; then
        echo "## Changes since ${PREV_TAG}" > release_notes.md
        RANGE="${PREV_TAG}..${CI_COMMIT_TAG}"
      else
        echo "## Changes" > release_notes.md
        RANGE="${CI_COMMIT_TAG}"
      fi
    # List commits, skipping merge commits and the automated release bumps.
    - git log --pretty=format:"- %s" --no-merges --invert-grep --grep="chore(release)" $RANGE >> release_notes.md
    - printf '\n' >> release_notes.md
    - cat release_notes.md
  release:
    tag_name: '$CI_COMMIT_TAG'
    name: 'ArtMap $CI_COMMIT_TAG'
    description: './release_notes.md'
    assets:
      links:
        - name: 'ArtMap-JDK17-${NEXT_VERSION}.jar  (Minecraft 1.18–1.20.4, Java 17)'
          url: '${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ArtMap/${NEXT_VERSION}/ArtMap-JDK17-${NEXT_VERSION}.jar'
          link_type: package
        - name: 'ArtMap-JDK21-${NEXT_VERSION}.jar  (Minecraft 1.20.5+, Java 21)'
          url: '${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ArtMap/${NEXT_VERSION}/ArtMap-JDK21-${NEXT_VERSION}.jar'
          link_type: package
  rules:
    - if: '$CI_COMMIT_TAG'

# Updates POM versions to keep them in line with the release tag.
# Only pushes if there are changes.
release:maven-release:
  extends: .jdk21
  stage: release
  needs: ["publish:jdk21"]
  variables:
    COMMIT_MESSAGE: "chore(release): [skip ci] Release ${NEXT_VERSION}"
  before_script:
    - git remote set-url origin https://GITLAB_TOKEN:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git
    - git config --global user.email "${GITLAB_USER_EMAIL}"
    - git config --global user.name "${GITLAB_USER_ID}"
  script:
    - git checkout master
    - mvn versions::set -DnewVersion=${NEXT_VERSION}
    - mvn versions::commit
    - git add .
    - |-
      CHANGES=$(git status --porcelain | wc -l)
      if [ "$CHANGES" -gt "0" ]; then
        git status
        git commit -m "${COMMIT_MESSAGE}"
        git push
      fi
  rules:
    - if: '$CI_COMMIT_TAG'